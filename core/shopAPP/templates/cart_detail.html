<!DOCTYPE html>
<html>
<head>
{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<title>Корзина</title>
<main>
  <h1>Корзина</h1>

  {% for item in cart %}
  <div class="cart-item">
    <div class="cart-item-info">
      <h3>{{ item.product.name }}</h3>
      <p>Цена: {{ item.price }} тг &nbsp;·&nbsp; Количество: {{ item.quantity }}</p>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <span class="cart-item-total">{{ item.total_price }} тг</span>
      <a href="{% url 'remove_from_cart' item.product.id %}" class="delete-btn">Удалить</a>
    </div>
  </div>
  {% empty %}
  <p class="cart-empty">Корзина пуста</p>
  {% endfor %}

  <div class="cart-total">
    <span>Итого:</span>
    <span>{{ cart.get_total_price }} тг</span>
  </div>

  <a href="{% url 'product_list' %}" class="back-link">← Вернуться к товарам</a>
</main>
