<h1>Корзина</h1>

{% for item in cart %}
    <div>
        <h3>{{ item.product.name }}</h3>
        <p>Цена: {{ item.price }} тг</p>
        <p>Количество: {{ item.quantity }}</p>
        <p>Сумма: {{ item.total_price }} тг</p>
        <a href="{% url 'remove_from_cart' item.product.id %}">Удалить</a>
    </div>
    <hr>
{% empty %}
    <p>Корзина пуста</p>
{% endfor %}

<h3>Итого: {{ cart.get_total_price }} тг</h3>
<p><a href="{% url 'home' %}">Вернуться к товарам</a></p>
